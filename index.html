<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ec4899">
    <title>Lover's Nudge 📸</title>
    <style>
        :root {
            --pink: #ec4899;
            --pink-dark: #db2777;
            --purple: #8b5cf6;
            --bg: #fdf2f8;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #f3e8ff;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(160deg, #fdf2f8 0%, #fce7f3 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: var(--card);
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(236, 72, 153, 0.15);
            padding: 28px;
        }
        h1 {
            margin: 0 0 4px;
            font-size: 26px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: var(--muted);
            margin: 0 0 24px;
            font-size: 14px;
        }
        .section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .section h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            margin: 0 0 12px;
        }
        label {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 6px;
        }
        input[type=text] {
            width: 100%;
            padding: 12px 14px;
            font-size: 15px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            outline: none;
            font-family: ui-monospace, "SF Mono", Menlo, monospace;
        }
        input[type=text]:focus { border-color: var(--pink); }
        .row { display: flex; gap: 8px; }
        .row input { flex: 1; }
        button {
            padding: 12px 16px;
            font-size: 15px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.05s, opacity 0.2s;
        }
        button:active { transform: scale(0.97); }
        button.secondary {
            background: #f3f4f6;
            color: var(--text);
        }
        button.primary {
            background: var(--pink);
            color: white;
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            margin-top: 8px;
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.35);
        }
        button.primary:hover { background: var(--pink-dark); }
        button.primary:disabled { opacity: 0.7; cursor: not-allowed; }
        ol { padding-left: 20px; margin: 8px 0; line-height: 1.7; font-size: 14px; }
        ol a { color: var(--purple); text-decoration: none; font-weight: 500; }
        ol a:hover { text-decoration: underline; }
        .spinner {
            display: inline-block; width: 1em; height: 1em;
            margin-right: 8px; vertical-align: -2px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1f2937; color: white;
            padding: 12px 20px; border-radius: 999px;
            font-size: 14px; opacity: 0;
            transition: transform 0.3s, opacity 0.3s;
            pointer-events: none; z-index: 100;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        details { margin-top: 16px; }
        details summary {
            cursor: pointer; font-size: 13px; color: var(--muted);
            user-select: none; padding: 4px 0;
        }
        details[open] summary { margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Lover's Nudge 📸</h1>
        <p class="subtitle">Tap the button. She gets a push. Simple as that.</p>

        <button id="nudgeBtn" class="primary">📸 Send Nudge</button>

        <div class="section">
            <h2>Your secret topic</h2>
            <div class="row">
                <input id="topicInput" type="text" autocomplete="off" spellcheck="false">
                <button id="copyTopicBtn" class="secondary" title="Copy topic">Copy</button>
            </div>
            <details>
                <summary>First-time setup (on her phone)</summary>
                <ol>
                    <li>Install <a href="https://ntfy.sh/app" target="_blank">ntfy</a>:
                        <a href="https://apps.apple.com/us/app/ntfy/id1625396347" target="_blank">iOS</a> ·
                        <a href="https://play.google.com/store/apps/details?id=io.heckel.ntfy" target="_blank">Android</a></li>
                    <li>Open ntfy → tap <b>+</b> → <b>Subscribe to topic</b></li>
                    <li>Paste the topic above and tap <b>Subscribe</b></li>
                    <li>Done! Test with the Send Nudge button.</li>
                </ol>
                <button id="shareBtn" class="secondary" style="width:100%; margin-top:8px;">
                    Copy setup link to send her
                </button>
            </details>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const NTFY_SERVER = 'https://ntfy.sh';

        const topicInput = document.getElementById('topicInput');
        const nudgeBtn   = document.getElementById('nudgeBtn');
        const copyBtn    = document.getElementById('copyTopicBtn');
        const shareBtn   = document.getElementById('shareBtn');
        const toast      = document.getElementById('toast');

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(showToast._t);
            showToast._t = setTimeout(() => toast.classList.remove('show'), 2200);
        }

        function randomTopic() {
            const arr = new Uint8Array(12);
            crypto.getRandomValues(arr);
            return 'nudge-' + Array.from(arr, b => b.toString(36)).join('').slice(0, 16);
        }

        // Topic priority: URL ?topic= > localStorage > newly generated.
        // A URL param means "her phone just opened the setup link" — save it.
        const urlTopic = new URLSearchParams(location.search).get('topic');
        if (urlTopic) {
            localStorage.setItem('nudgeTopic', urlTopic);
            history.replaceState({}, '', location.pathname);
        }
        let topic = localStorage.getItem('nudgeTopic');
        if (!topic) {
            topic = randomTopic();
            localStorage.setItem('nudgeTopic', topic);
        }
        topicInput.value = topic;

        topicInput.addEventListener('change', () => {
            const val = topicInput.value.trim();
            if (val) {
                localStorage.setItem('nudgeTopic', val);
                showToast('Topic saved');
            }
        });

        copyBtn.addEventListener('click', async () => {
            await navigator.clipboard.writeText(topicInput.value);
            showToast('Topic copied');
        });

        shareBtn.addEventListener('click', async () => {
            const link = `${location.origin}${location.pathname}?topic=${encodeURIComponent(topicInput.value)}`;
            if (navigator.share) {
                try { await navigator.share({ url: link, title: "Lover's Nudge setup" }); return; }
                catch { /* fall through to clipboard */ }
            }
            await navigator.clipboard.writeText(link);
            showToast('Setup link copied');
        });

        const NUDGE_LABEL = '📸 Send Nudge';
        nudgeBtn.addEventListener('click', async () => {
            const t = topicInput.value.trim();
            if (!t) { showToast('Set a topic first'); return; }
            nudgeBtn.disabled = true;
            nudgeBtn.innerHTML = '<span class="spinner"></span> Sending...';
            try {
                const res = await fetch(`${NTFY_SERVER}/${encodeURIComponent(t)}`, {
                    method: 'POST',
                    headers: {
                        'Title': "Lover's Nudge 📸",
                        'Tags':  'camera_with_flash,heart',
                        'Priority': 'high'
                    },
                    body: 'Send a photo!'
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                showToast('Sent! 💕');
            } catch (err) {
                showToast('Failed: ' + err.message);
            } finally {
                nudgeBtn.disabled = false;
                nudgeBtn.textContent = NUDGE_LABEL;
            }
        });
    </script>
</body>
</html>
