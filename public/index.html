<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lover's Nudge</title>
    <style>
        body { font-family: Arial; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #fdf2f8; }
        button { padding: 15px 30px; margin: 10px; font-size: 18px; border-radius: 25px; border: none; cursor: pointer; color: white; }
        #subscribeBtn { background-color: #8b5cf6; }
        #nudgeBtn { background-color: #ec4899; }
        #nudgeBtn:disabled { opacity: 0.7; cursor: not-allowed; }
        .spinner { display: inline-block; width: 1em; height: 1em; margin-right: 8px; vertical-align: middle; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h2>Lover's Nudge 📸</h2>
    
    <button id="subscribeBtn">1. Girlfriend: Enable Notifications</button>
    
    <button id="nudgeBtn">2. You: Ask for a Photo!</button>

    <script>
        const publicVapidKey = 'BIbLL4phpOOBFbYvxnVeEhuLngYTisFwD9ORYGXOANc-w1S4WofR_UTa54esmiYgLOGQcXxwfvPe1dii1j7tdvs';

        // Backend URL: empty = same origin (local dev). For GitHub Pages, set your Render URL:
        const BACKEND_URL = 'https://amitsendphoto.onrender.com'; // e.g. 'https://amit-send-photo.onrender.com'

        // Check if service workers and push are supported
        if ('serviceWorker' in navigator && 'PushManager' in window) {

            // 1. Subscribe her phone
            document.getElementById('subscribeBtn').addEventListener('click', async () => {
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') {
                    alert('Notifications were denied. Enable them in browser settings and try again.');
                    return;
                }
                const registration = await navigator.serviceWorker.register('sw.js');
                const subscription = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: publicVapidKey
                });

                const subRes = await fetch(`${BACKEND_URL}/subscribe`, {
                    method: 'POST',
                    body: JSON.stringify(subscription),
                    headers: { 'Content-Type': 'application/json' }
                });
                if (!subRes.ok) {
                    alert('Failed to save subscription. Check console.');
                    return;
                }
                alert('Notifications Enabled! You can close this now.');
            });

            // 2. You send the nudge (with spinner — safe to close once request is sent)
            const nudgeBtn = document.getElementById('nudgeBtn');
            const nudgeLabel = '2. You: Ask for a Photo!';
            nudgeBtn.addEventListener('click', async () => {
                nudgeBtn.disabled = true;
                nudgeBtn.innerHTML = '<span class="spinner"></span> Sending...';
                try {
                    const res = await fetch(`${BACKEND_URL}/send-notification`, { method: 'POST' });
                    if (res.ok) {
                        alert('Sent!');
                    } else {
                        const msg = await res.text();
                        alert('Error: ' + (msg || 'Make sure she subscribed first.'));
                    }
                } finally {
                    nudgeBtn.disabled = false;
                    nudgeBtn.textContent = nudgeLabel;
                }
            });
        } else {
            alert('Push notifications are not supported in this browser.');
        }
    </script>
</body>
</html>
